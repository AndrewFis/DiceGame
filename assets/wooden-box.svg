      <path d="M346 332c16-19 34-22 53-2M349 346c18 12 34 12 49-1" fill="none" stroke="#2c190e" stroke-width="4" stroke-linecap="round"/>
      <text x="372" y="327" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#2c190e">Purple House</text>
      <text x="372" y="344" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#2c190e">Even &amp; Odd</text>
      <circle cx="96" cy="232" r="28" fill="#dfaa3d"/>
