      <polygon points="222,143 281,116 335,142 276,170"/>
      <polygon points="281,115 341,88 394,114 335,141"/>
      <polygon points="222,202 280,174 335,202 276,232"/>
      <polygon points="282,172 341,144 396,172 336,201"/>
