<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" role="img" aria-labelledby="title desc">
  <title id="title">Purple House wooden dice game box</title>
  <desc id="desc">A stylized wooden box with a three by three game grid, an emblem on the front, and accurate black and white dice.</desc>
  <defs>
    <linearGradient id="woodTop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0bd68"/>
      <stop offset=".5" stop-color="#c87d31"/>
      <stop offset="1" stop-color="#8a481e"/>
    </linearGradient>
    <linearGradient id="woodFront" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d98d3a"/>
      <stop offset=".58" stop-color="#a96225"/>
      <stop offset="1" stop-color="#6b3517"/>
    </linearGradient>
    <linearGradient id="woodSide" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#bf7130"/>
      <stop offset="1" stop-color="#7a3b18"/>
    </linearGradient>
    <linearGradient id="whiteDie" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9eb"/>
      <stop offset="1" stop-color="#dbcbb0"/>
    </linearGradient>
    <linearGradient id="blackDie" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2a2d31"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#271407" flood-opacity=".24"/>
    </filter>
    <g id="pipBlack"><circle r="7" fill="#151719"/></g>
    <g id="pipWhite"><circle r="7" fill="#fff9eb" stroke="#ded6ca" stroke-width="1.5"/></g>
  </defs>

  <g filter="url(#shadow)">
    <polygon points="108,174 340,66 548,164 306,292" fill="url(#woodTop)" stroke="#21130a" stroke-width="8" stroke-linejoin="round"/>
    <polygon points="108,174 306,292 306,438 108,320" fill="url(#woodFront)" stroke="#21130a" stroke-width="8" stroke-linejoin="round"/>
    <polygon points="306,292 548,164 548,310 306,438" fill="url(#woodSide)" stroke="#21130a" stroke-width="8" stroke-linejoin="round"/>

    <g opacity=".28" stroke="#5d2f14" stroke-width="2">
      <path d="M130 203l176 105M151 239l154 91M172 276l132 78M330 309l196-103M331 346l196-103M331 384l195-103"/>
      <path d="M160 171l225-103M207 198l226-104M254 225l226-104M118 215l190 111M118 255l188 112"/>
